version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pipeline/database.sql:/docker-entrypoint-initdb.d/init.sql

  pipeline:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    command: python execution.py

  api:
    build: ./backend
    env_file: .env
    depends_on:
      - db
    ports:
      - "8080:8080"
    command: uvicorn api:app --host 0.0.0.0 --port 8080

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api